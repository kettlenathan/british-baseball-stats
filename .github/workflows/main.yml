
# .github/workflows/refresh-data.yml

name: Refresh Data

on:
  schedule:
    # Every Sunday at 21:00 UK time
    # GitHub uses UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  refresh:
    # Self-hosted runner: stats.britishbaseball.org.uk started 403-blocking
    # GitHub-hosted (datacenter) runner IPs the week of 2026-07-19, so this
    # job must originate from a residential connection. One-time setup on the
    # machine that will run it (repo Settings → Actions → Runners → "New
    # self-hosted runner" shows the exact commands with a fresh token):
    #
    #   ./config.sh --url https://github.com/kettlenathan/british-baseball-stats --token <token>
    #   sudo ./svc.sh install && sudo ./svc.sh start   # run as a service so reboots don't kill it
    #
    # If the runner is offline at 21:00 on a Sunday, the run queues and then
    # fails once GitHub times it out — same "red run, no publish" outcome as
    # any other failure, and the next week's --last-month window covers the gap.
    runs-on: [self-hosted, linux]
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # No actions/setup-python here (the hosted-runner version had it): a
      # bare self-hosted machine lacks the hosted tool cache that action
      # relies on, and uv sync downloads its own managed CPython matching
      # .python-version (3.13) anyway.
      - name: Install dependencies
        run: uv sync

      # Must run before alembic: a fresh checkout has no local data/stats.db
      # at all, and SQLite auto-creates an empty file the moment anything
      # connects to that path — including alembic itself. Fetching the real
      # published snapshot first means alembic upgrades *that*, not a blank
      # database that would otherwise get published over the real data.
      - name: Fetch latest published data
        run: uv run python -m scripts.pull_latest_db

      - name: Apply pending migrations
        run: uv run alembic upgrade head

      - name: Refresh data
        run: |
          uv run python -m scripts.refresh_data \
            --leagues nbl,d2,d3,d4,d5 \
            --years 2026 \
            --last-month

      # Runs only if every step above succeeded — scripts.refresh_data exits
      # non-zero when *all* schedule scrapes fail, which fails the job here
      # rather than silently republishing an unchanged database.
      - name: Publish data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m scripts.publish_db
