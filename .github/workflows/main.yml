
# .github/workflows/refresh-data.yml

name: Refresh Data

on:
  schedule:
    # Every Sunday at 21:00 UK time
    # GitHub uses UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Refresh data
        run: |
          uv run python -m scripts.refresh_data \
            --leagues nbl,d2,d3,d4,d5 \
            --years 2026 \
            --last-week

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/
          git commit -m "Weekly data refresh" || exit 0
          git push
