
# .github/workflows/refresh-data.yml

name: Refresh Data

on:
  schedule:
    # Every Sunday at 21:00 UK time
    # GitHub uses UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      # Must run before alembic: a fresh checkout has no local data/stats.db
      # at all, and SQLite auto-creates an empty file the moment anything
      # connects to that path — including alembic itself. Fetching the real
      # published snapshot first means alembic upgrades *that*, not a blank
      # database that would otherwise get published over the real data.
      - name: Fetch latest published data
        run: uv run python -m scripts.pull_latest_db

      - name: Apply pending migrations
        run: uv run alembic upgrade head

      - name: Refresh data
        run: |
          uv run python -m scripts.refresh_data \
            --leagues nbl,d2,d3,d4,d5 \
            --years 2026 \
            --last-month

      - name: Publish data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m scripts.publish_db
